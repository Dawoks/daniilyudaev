name: Fast & Clean Framer Deploy
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Обновление каждый час

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Site (Optimized)
        run: |
          # Чистим временные папки перед началом
          rm -rf ./temp_site ./dist
          
          # Скачиваем: 2 уровня вложенности (Главная -> Кейсы)
          # Этого хватит, чтобы все ссылки внутри кейсов работали
          wget --recursive \
               --level=2 \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --span-hosts \
               --domains="${{ secrets.FRAMER_URL }}",framerusercontent.com \
               --exclude-domains=google-analytics.com,googletagmanager.com,facebook.net \
               --header="Accept: image/avif,image/webp,*/*" \
               "${{ secrets.FRAMER_URL }}" -P ./temp_site
          
          # Перенос файлов в папку для деплоя
          mkdir -p ./dist
          # Копируем содержимое, игнорируя лишние вложенные папки доменов
          find ./temp_site -mindepth 2 -maxdepth 2 -type d -exec cp -rn {}/. ./dist/ \; || cp -r ./temp_site/* ./dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
