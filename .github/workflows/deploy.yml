name: Deploy Framer via ToStatic
on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ToStatic (Direct)
        run: |
          # Скачиваем скрипт напрямую, если его нет в реестре
          npm install -g https://github.com --force

      - name: Export from Framer
        env:
          TOSTATIC_KEY: ${{ secrets.TOSTATIC_API_KEY }}
          SITE_URL: ${{ secrets.FRAMER_URL }}
        run: |
          # Используем npx для запуска, если обычная команда не сработает
          npx tostatic export "$SITE_URL" --out ./dist --key "$TOSTATIC_KEY"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
