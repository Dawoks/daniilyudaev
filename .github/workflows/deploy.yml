name: Deploy Framer via ToStatic
on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ToStatic CLI
        run: |
          # Устанавливаем актуальную версию напрямую
          npm install -g @tostatic/cli || npm install -g tostatic-cli

      - name: Export from Framer
        env:
          TOSTATIC_KEY: ${{ secrets.TOSTATIC_API_KEY }}
          SITE_URL: ${{ secrets.FRAMER_URL }}
        run: |
          # Запускаем экспорт в папку dist
          tostatic export "$SITE_URL" --out ./dist --key "$TOSTATIC_KEY"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
