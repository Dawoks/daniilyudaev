name: Ultimate Free Framer Deploy
on:
  workflow_dispatch: # Кнопка для запуска вручную
  schedule:
    - cron: '0 * * * *' # Авто-обновление каждый час

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Framer Site (Full Mirror)
        run: |
          # Мы разрешаем скачивать картинки с серверов Framer прямо в репозиторий
          wget --mirror \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --span-hosts \
               --domains="${{ secrets.FRAMER_URL }}",framerusercontent.com,framer.com \
               --header="Accept: image/avif,image/webp,*/*" \
               "${{ secrets.FRAMER_URL }}" -P ./temp_site
          
          # Очистка и перенос файлов
          mkdir -p ./dist
          cp -r ./temp_site/*/* ./dist/ || cp -r ./temp_site/* ./dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
