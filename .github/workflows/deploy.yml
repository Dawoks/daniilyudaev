name: Ultimate Stable Framer Deploy
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Site
        run: |
          # Чистим старое
          rm -rf ./temp_site ./dist
          
          # Скачиваем всё важное (шрифты, анимации, картинки)
          # Но запрещаем качать бесконечный системный мусор
          wget --recursive \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --span-hosts \
               --domains="${{ secrets.FRAMER_URL }}",framerusercontent.com,framer.com \
               --exclude-domains=google-analytics.com,googletagmanager.com,facebook.net,connect.facebook.net \
               --exclude-directories=/_next/static/webpack,/_next/static/logs \
               --header="Accept: image/avif,image/webp,*/*" \
               --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               "${{ secrets.FRAMER_URL }}" -P ./temp_site
          
          # Умный поиск папки с сайтом и перенос в dist
          mkdir -p ./dist
          SITE_DIR=$(find ./temp_site -name "index.html" -printf '%h' -quit)
          cp -r $SITE_DIR/. ./dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
