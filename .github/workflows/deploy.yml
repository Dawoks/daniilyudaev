name: Fast Framer Pages Deploy

on:
  workflow_dispatch:
#  schedule:
#    - cron: '0 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download site structure
        env:
          FRAMER_URL: ${{ secrets.FRAMER_URL }}
        run: |
          set -e
          rm -rf ./temp_site ./dist

          SITE_HOST=$(echo "$FRAMER_URL" | sed -E 's#https?://([^/]+)/?.*#\1#')

          wget \
            -e robots=off \
            -nv \
            --recursive \
            --level=2 \
            --convert-links \
            --adjust-extension \
            --no-parent \
            --domains="$SITE_HOST" \
            --reject="*.map,robots.txt,*.xml" \
            --timeout=20 \
            --tries=2 \
            --waitretry=1 \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -P ./temp_site \
            "$FRAMER_URL"

          mkdir -p ./dist
          cp -R ./temp_site/. ./dist/
          find ./dist -type f -name "*.html" -exec sed -i 's|</head>|<style>#__framer-badge-container,#__framer-editorbar-container,#__framer-editorbar-button,#__framer-editorbar-label{display:none !important;visibility:hidden !important;opacity:0 !important;pointer-events:none !important}</style></head>|g' {} +

          touch ./dist/.nojekyll

          cat > ./dist/index.html <<EOF
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./$SITE_HOST/">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Redirecting…</title>
            <link rel="canonical" href="./$SITE_HOST/">
          </head>
          <body>
            <p>Redirecting to <a href="./$SITE_HOST/">$SITE_HOST</a>…</p>
          </body>
          </html>
          EOF

          cp ./dist/index.html ./dist/404.html

      - name: Show site size
        run: |
          du -sh ./dist
          du -sb ./dist

      - name: Upload artifact
        uses: actions/upload-pages-artifac
