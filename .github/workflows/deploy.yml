name: Deploy Framer via Official CLI
on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Framer CLI
        run: npm install -g framer-cli

      - name: Export from Framer
        env:
          FRAMER_TOKEN: ${{ secrets.TOSTATIC_API_KEY }}
          SITE_URL: ${{ secrets.FRAMER_URL }}
        run: |
          # Экспорт проекта напрямую через официальный инструмент
          framer-cli export "$SITE_URL" --out ./dist --token "$FRAMER_TOKEN"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
