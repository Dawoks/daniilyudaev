name: Deploy Framer via ToStatic
on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ToStatic (Universal method)
        run: |
          # Скачиваем официальный CLI инструмент ToStatic
          npm install -g tostatic-cli || npm install -g @tostatic/cli || true

      - name: Export from Framer
        env:
          TOSTATIC_KEY: ${{ secrets.TOSTATIC_API_KEY }}
          SITE_URL: ${{ secrets.FRAMER_URL }}
        run: |
          # Пробуем запустить экспорт напрямую через npx (самый стабильный способ)
          npx tostatic-cli export "$SITE_URL" --out ./dist --key "$TOSTATIC_KEY" || \
          npx @tostatic/cli export "$SITE_URL" --out ./dist --key "$TOSTATIC_KEY"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
