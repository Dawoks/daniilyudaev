name: Full Framer Mirror Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirror Framer site
        env:
          FRAMER_URL: ${{ secrets.FRAMER_URL }}
        run: |
          set -e
          rm -rf ./temp_site ./dist

          SITE_HOST=$(echo "$FRAMER_URL" | sed -E 's#https?://([^/]+)/?.*#\1#')

          wget \
            -e robots=off \
            -nv \
            --recursive \
            --level=2 \
            --page-requisites \
            --convert-links \
            --adjust-extension \
            --span-hosts \
            --no-parent \
            --timeout=20 \
            --tries=2 \
            --waitretry=1 \
            --domains="$SITE_HOST,framerusercontent.com,framer.com,public.blob.vercel-storage.com" \
            --exclude-domains=google-analytics.com,googletagmanager.com,facebook.net,doubleclick.net \
            --reject-regex='(framer\.com/marketplace/|/templates/|%2Ftemplates%2F|/plugins/|%2Fplugins%2F|/sites/[0-9]+/thumbnail-|%2Fsites%2F[0-9]+%2Fthumbnail-)' \
            --reject="*.map,robots.txt" \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -P ./temp_site \
            "$FRAMER_URL"

          mkdir -p ./dist
          cp -R ./temp_site/. ./dist/

          touch ./dist/.nojekyll

          cat > ./dist/index.html <<EOF
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./$SITE_HOST/">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Redirecting…</title>
            <link rel="canonical" href="./$SITE_HOST/">
          </head>
          <body>
            <p>Redirecting to <a href="./$SITE_HOST/">$SITE_HOST</a>…</p>
          </body>
          </html>
          EOF

          cp ./dist/index.html ./dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
