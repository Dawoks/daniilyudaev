name: Free Framer Autodeploy
on:
  workflow_dispatch: # Запуск кнопкой
  schedule:
    - cron: '0 * * * *' # Авто-обновление каждый час (по желанию)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Framer Site
        run: |
          # Мы берем ваш опубликованный сайт и скачиваем его целиком
          # Замените адрес в кавычках на ваш .framer.ai если не хотите использовать секреты
          wget --mirror --convert-links --adjust-extension --page-requisites --no-parent "${{ secrets.FRAMER_URL }}" -P ./temp_site
          
          # Переносим файлы в чистую папку для деплоя
          mkdir ./dist
          cp -r ./temp_site/*/* ./dist/ || cp -r ./temp_site/* ./dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
