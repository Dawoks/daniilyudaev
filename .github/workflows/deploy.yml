name: Fast & Clean Framer Deploy
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Site
        run: |
          # Полная очистка перед стартом
          rm -rf ./temp_site ./dist
          
          # Скачиваем сайт (level 2 достанет до кейсов)
          wget --recursive \
               --level=2 \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --span-hosts \
               --domains="${{ secrets.FRAMER_URL }}",framerusercontent.com \
               --exclude-domains=google-analytics.com,googletagmanager.com \
               --header="Accept: image/avif,image/webp,*/*" \
               "${{ secrets.FRAMER_URL }}" -P ./temp_site
          
          # Самый надежный способ переноса:
          # Ищем папку, где лежит index.html и копируем всё из неё в dist
          mkdir -p ./dist
          SITE_DIR=$(find ./temp_site -name "index.html" -printf '%h' -quit)
          cp -r $SITE_DIR/. ./dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
